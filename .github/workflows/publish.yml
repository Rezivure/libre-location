name: Publish to pub.dev

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - name: Determine version bump and publish
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          
          # Check commits since last version tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "$LAST_TAG"..HEAD --pretty=format:"%s")
          else
            COMMITS=$(git log --pretty=format:"%s" -20)
          fi
          
          # Determine bump type from conventional commits
          # BREAKING CHANGE or feat!: or fix!: → major (only when >= 1.0.0)
          # feat: → minor
          # fix: chore: refactor: ci: docs: etc → patch
          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "^feat(\(.*\))?!:|BREAKING CHANGE"; then
            if [ "$MAJOR" -ge 1 ]; then
              BUMP="major"
            else
              BUMP="minor"
            fi
          elif echo "$COMMITS" | grep -qiE "^feat(\(.*\))?:"; then
            BUMP="minor"
          fi
          
          case $BUMP in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="$MAJOR.$((MINOR + 1)).0" ;;
            patch) NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))" ;;
          esac
          
          # Check if current version already published
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://pub.dev/api/packages/libre_location/versions/$CURRENT")
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Version $CURRENT exists — bumping $BUMP to $NEW_VERSION"
            sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
            
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add pubspec.yaml
            git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
            git tag "v$NEW_VERSION"
            git push
            git push --tags
            
            dart pub publish --force
          else
            echo "Version $CURRENT not yet published — publishing as-is"
            git tag "v$CURRENT" 2>/dev/null || true
            git push --tags 2>/dev/null || true
            dart pub publish --force
          fi
